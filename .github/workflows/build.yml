name: Build Kingdom & Custody

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.2'

      - name: Build with Gradle
        run: gradle build

      - name: Upload mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: kingdom-and-custody
          path: build/libs/*.jar
